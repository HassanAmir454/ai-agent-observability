services:

  database:
    image: mcr.microsoft.com/azure-sql-edge
    environment:
      ACCEPT_EULA: "1"
      MSSQL_SA_PASSWORD: "Your_strong_Pass123"
    ports:
      - "1433:1433"
    volumes:
      - db-data:/var/opt/mssql
    healthcheck:
      test:
        - CMD
        - /opt/mssql-tools/bin/sqlcmd
        - -S
        - localhost
        - -U
        - sa
        - -P
        - "Your_strong_Pass123"
        - -Q
        - "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  db-init:
    image: mcr.microsoft.com/azure-sql-edge
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./database:/scripts:ro
    command: >
      /bin/bash -c "
        /opt/mssql-tools/bin/sqlcmd -S database -U sa -P 'Your_strong_Pass123' -d master -i /scripts/init.sql &&
        /opt/mssql-tools/bin/sqlcmd -S database -U sa -P 'Your_strong_Pass123' -d master -i /scripts/seed.sql
      "
    restart: "no"

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
    environment:
      SqlConnectionString: "Server=database,1433;Database=master;User Id=sa;Password=Your_strong_Pass123;TrustServerCertificate=True;"
      CollectorApiKey: "local-dev-key-change-me"
      JwtSigningKey: "change-me-in-production-use-32plus-chars!!"
    ports:
      - "7071:80"

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  db-data:
